name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Create App
        run: |
          mkdir -p www
          
          cat > www/index.html << 'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <meta name="apple-mobile-web-app-capable" content="yes">
            <title>有声剧生成器</title>
            <style>
              * { margin: 0; padding: 0; }
              html, body { width: 100%; height: 100%; overflow: hidden; background: #0f172a; }
              iframe { width: 100%; height: 100%; border: none; }
              .loading {
                position: fixed; top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                color: #6366f1; font-family: sans-serif; font-size: 18px;
              }
            </style>
          </head>
          <body>
            <div class="loading" id="loading">Loading...</div>
            <iframe src="https://409ecd19-2cee-4b04-8cb0-a96b3b576ae6.dev.coze.site" onload="document.getElementById('loading').style.display='none'"></iframe>
          </body>
          </html>
          HTML
          
          npm init -y
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/ios@6
          npx cap init "有声剧" com.audiobook.generator --web-dir www
          npx cap add ios
          npx cap sync ios
      
      - name: Build iOS
        run: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build
      
      - name: Find and Package IPA
        run: |
          APP_PATH=$(find ios/App/build -name "App.app" -type d | head -1)
          echo "Found App at: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: App.app not found"
            ls -la ios/App/build/Build/Products/Release-iphoneos/ 2>/dev/null || true
            exit 1
          fi
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -ry audiobook.ipa Payload
          ls -la audiobook.ipa
      
      - uses: actions/upload-artifact@v4
        with:
          name: audiobook-ipa
          path: audiobook.ipa
